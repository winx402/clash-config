services:
  sub-store:
    image: xream/sub-store:http-meta
    container_name: sub-store
    restart: always
    ports:
      - "3001:3001"
      - "3000:3000"
      - "9876:9876"
    environment:
      SUB_STORE_BACKEND_API_HOST: 0.0.0.0
      SUB_STORE_BACKEND_API_PORT: 3001
      SUB_STORE_BACKEND_MERGE: "true"
      SUB_STORE_PRODUCE_CRON: "0 7 * * *,sub,管人痴;0 7 * * *,sub,cornss;0 7 * * *,sub,syq;0 7 * * *,sub,微斯人"
      SUB_STORE_BACKEND_SYNC_CRON: "0 8 * * *"
      SUB_STORE_FRONTEND_BACKEND_PATH: /cD7wiTGitLyoBdEguAnFWmqCpHKwhLQh4opXfFhFCEpmY9K7YnPgFu9e2iiUoty2
      HOST: 0.0.0.0
      PORT: 9876
    volumes:
      - ${HOME}/sub-store-data:/opt/app/data
      - /Users/tooop/github/clash-config/docker/sub-store/sub-store.bundle.patched.js:/opt/app/sub-store.bundle.js:ro
